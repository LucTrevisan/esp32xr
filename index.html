<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SENAI XR Lab — ESP32</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --red:    #E3000F;
    --panel:  rgba(20,2,4,0.92);
    --teal:   #00C9A7;
    --gold:   #F5A623;
    --text:   #F0E6E6;
    --dim:    rgba(240,230,230,0.45);
    --border: rgba(227,0,15,0.3);
    --mono:   'Share Tech Mono', monospace;
    --head:   'Rajdhani', sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box }
  body { background:#0a0002; color:var(--text); font-family:var(--mono); overflow:hidden }

  /* HUD */
  #hud {
    position:fixed; top:0; left:0; right:0; z-index:10;
    display:none; align-items:center;
    height:48px; background:var(--panel);
    border-bottom:1px solid var(--border);
  }
  .hud-block {
    display:flex; align-items:center; gap:8px;
    padding:0 16px; height:100%;
    border-right:1px solid var(--border);
  }
  .hud-block:last-child { border-right:none }
  #logo-text {
    font-family:var(--head); font-size:22px; font-weight:700;
    color:var(--red); letter-spacing:3px;
    text-shadow:0 0 12px rgba(227,0,15,0.5);
  }
  #logo-sub { font-size:9px; color:var(--dim); letter-spacing:2px; line-height:1.4 }
  #dot {
    width:7px; height:7px; border-radius:50%;
    background:#e24b4a; box-shadow:0 0 6px #e24b4a; transition:all .3s;
  }
  #dot.on { background:var(--teal); box-shadow:0 0 8px var(--teal) }
  #status-txt { font-size:10px; color:var(--dim); min-width:170px }
  #sensor-wrap { flex:1; display:flex; align-items:center; gap:10px; padding:0 16px }
  #sensor-label { font-size:9px; color:var(--dim); letter-spacing:1px; white-space:nowrap }
  #barra-wrap { flex:1; height:4px; background:rgba(255,255,255,0.08); border-radius:2px; overflow:hidden }
  #barra {
    height:100%; width:0%;
    background:linear-gradient(90deg,var(--teal),var(--gold),var(--red));
    border-radius:2px; transition:width .08s;
  }
  #num { font-size:12px; color:var(--gold); min-width:52px; text-align:right }
  #rpm-label { font-size:8px; color:var(--dim); letter-spacing:1px }
  #rpm-val { font-family:var(--head); font-size:18px; color:var(--gold) }

  /* Botões XR */
  #btn-wrap {
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
    display:none; gap:10px; z-index:10;
  }
  .btn-xr {
    padding:9px 22px; border-radius:4px;
    border:1px solid var(--border); background:var(--panel);
    color:var(--text); font-family:var(--mono);
    font-size:12px; cursor:pointer; letter-spacing:1px; transition:all .2s;
  }
  .btn-xr:hover:not(:disabled) {
    background:var(--red); border-color:var(--red);
    box-shadow:0 0 12px rgba(227,0,15,0.4);
  }
  .btn-xr:disabled { opacity:0.3; cursor:not-allowed }

  /* Scanlines */
  #scanlines {
    position:fixed; inset:0; z-index:5; pointer-events:none;
    background:repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px
    );
  }

  /* Telemetria */
  #telemetry {
    position:fixed; bottom:20px; right:20px; z-index:10;
    display:none; flex-direction:column; gap:4px; align-items:flex-end;
  }
  .telem-row { font-size:10px; color:var(--dim) }
  .telem-val { color:var(--teal) }

  /* Loading */
  #loading {
    position:fixed; inset:0; z-index:20;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    background:#0a0002; gap:20px;
  }
  #loading-logo {
    font-family:var(--head); font-size:52px; font-weight:700;
    color:var(--red); letter-spacing:8px;
    animation:pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100%{ text-shadow:0 0 20px rgba(227,0,15,0.4) }
    50%    { text-shadow:0 0 40px rgba(227,0,15,0.9) }
  }
  #loading-sub { font-size:11px; color:var(--dim); letter-spacing:3px }
  #loading-txt { font-size:11px; color:var(--dim) }
  #prog-wrap { width:220px; height:2px; background:rgba(255,255,255,0.08); border-radius:1px }
  #prog {
    height:100%; width:0%; background:var(--red);
    border-radius:1px; transition:width .3s; box-shadow:0 0 8px var(--red);
  }
  #erro { color:#FF3B2F; font-size:11px; display:none; text-align:center }

  canvas { width:100%; height:100vh; display:block }
</style>
</head>
<body>

<div id="scanlines"></div>

<!-- Loading -->
<div id="loading">
  <div id="loading-logo">SENAI</div>
  <div id="loading-sub">XR LAB · ESP32 · MECATRÔNICA</div>
  <div id="prog-wrap"><div id="prog"></div></div>
  <div id="loading-txt">Iniciando Babylon.js...</div>
  <div id="erro"></div>
</div>

<!-- HUD superior -->
<div id="hud">
  <div class="hud-block">
    <div>
      <div id="logo-text">SENAI</div>
      <div id="logo-sub">XR LAB<br>MECATRÔNICA</div>
    </div>
  </div>
  <div class="hud-block">
    <div id="dot"></div>
    <span id="status-txt">Aguardando ESP32...</span>
  </div>
  <div id="sensor-wrap">
    <span id="sensor-label">POTENCIÔMETRO</span>
    <div id="barra-wrap"><div id="barra"></div></div>
    <span id="num">0.000</span>
  </div>
  <div class="hud-block">
    <div>
      <div id="rpm-label">RPM SIM</div>
      <div id="rpm-val">0</div>
    </div>
  </div>
</div>

<!-- Botões XR -->
<div id="btn-wrap">
  <button class="btn-xr" id="btn-vr">[ VR IMERSIVO ]</button>
  <button class="btn-xr" id="btn-ar">[ AR PASSTHROUGH ]</button>
</div>

<!-- Telemetria -->
<div id="telemetry">
  <div class="telem-row">ROTAÇÃO: <span class="telem-val" id="t-rot">0°</span></div>
  <div class="telem-row">TEMP SIM: <span class="telem-val" id="t-temp">20.0°C</span></div>
  <div class="telem-row">WS: <span class="telem-val" id="t-ws">--</span></div>
</div>

<canvas id="cvs" style="display:none"></canvas>

<!-- MQTT.js — cliente MQTT sobre WebSocket -->
<script src="https://unpkg.com/mqtt@5.3.4/dist/mqtt.min.js"></script>

<script>
// ═══════════════════════════════════════════════════════════
//  CONFIGURAÇÃO — MQTT sobre WSS
//  Broker público HiveMQ — sem túnel, sem IP fixo
//  Mesmo tópico configurado no ESP32
// ═══════════════════════════════════════════════════════════
const MQTT_BROKER = "wss://broker.hivemq.com:8884/mqtt";
const MQTT_TOPICO = "senai/esp32xr/sensor";
const MODEL_URL   = "https://luctrevisan.github.io/esp32xr/assets/models/engrenagem.glb";
// ═══════════════════════════════════════════════════════════

// ── Utilitários de loading ───────────────────────────────────
function setProgresso(pct, txt) {
  document.getElementById('prog').style.width = pct + '%';
  if (txt) document.getElementById('loading-txt').textContent = txt;
}
function mostrarErro(msg) {
  const el = document.getElementById('erro');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('loading-txt').textContent = 'Falha ao carregar';
}

// ── Atualiza HUD ─────────────────────────────────────────────
function atualizarHUD(v) {
  const rpm = Math.round(v * 3600);
  document.getElementById('barra').style.width   = (v * 100) + '%';
  document.getElementById('num').textContent     = v.toFixed(3);
  document.getElementById('rpm-val').textContent = rpm;
  document.getElementById('t-rot').textContent   = (rotAcum * 180 / Math.PI % 360).toFixed(0) + '°';
  document.getElementById('t-temp').textContent  = (20 + v * 60).toFixed(1) + '°C';
}

// ── Estado global ────────────────────────────────────────────
let valorSensor = 0;   // 0.0 a 1.0 — vem do ESP32
let rotAcum     = 0;   // acumulador de rotação para telemetria
let meshesGLB   = [];  // todos os meshes do modelo carregado
let rootGLB     = null;// TransformNode raiz do GLB (__root__)
let usandoGLB   = false;

// ═══════════════════════════════════════════════════════════
//  CENA BABYLON.JS
// ═══════════════════════════════════════════════════════════
async function iniciarCena() {
  // Mostra UI
  document.getElementById('loading').style.display   = 'none';
  document.getElementById('hud').style.display       = 'flex';
  document.getElementById('btn-wrap').style.display  = 'flex';
  document.getElementById('telemetry').style.display = 'flex';
  document.getElementById('cvs').style.display       = 'block';

  const canvas = document.getElementById('cvs');
  const engine = new BABYLON.Engine(canvas, true, { preserveDrawingBuffer: true });
  const scene  = new BABYLON.Scene(engine);
  scene.clearColor = new BABYLON.Color4(0.04, 0.01, 0.01, 1);

  // Neblina
  scene.fogMode    = BABYLON.Scene.FOGMODE_EXP2;
  scene.fogColor   = new BABYLON.Color3(0.06, 0.01, 0.01);
  scene.fogDensity = 0.03;

  // ── Câmera ─────────────────────────────────────────────
  const cam = new BABYLON.ArcRotateCamera(
    'cam', -Math.PI / 2.2, 1.05, 10, new BABYLON.Vector3(0, 1, 0), scene
  );
  cam.attachControl(canvas, true);
  cam.lowerRadiusLimit = 3;
  cam.upperRadiusLimit = 25;
  cam.lowerBetaLimit   = 0.3;

  // ── Iluminação ─────────────────────────────────────────
  const ambLuz = new BABYLON.HemisphericLight('amb', new BABYLON.Vector3(0,1,0), scene);
  ambLuz.intensity   = 0.35;
  ambLuz.diffuse     = new BABYLON.Color3(0.6, 0.7, 1.0);
  ambLuz.groundColor = new BABYLON.Color3(0.1, 0.05, 0.05);

  const spot = new BABYLON.SpotLight(
    'spot', new BABYLON.Vector3(0,6,0), new BABYLON.Vector3(0,-1,0),
    Math.PI / 3, 2, scene
  );
  spot.diffuse   = new BABYLON.Color3(1.0, 0.05, 0.05);
  spot.intensity = 1.2;

  const fill = new BABYLON.PointLight('fill', new BABYLON.Vector3(-4,3,-2), scene);
  fill.diffuse   = new BABYLON.Color3(0.0, 0.8, 0.7);
  fill.intensity = 0.5;

  // ── Chão metálico ──────────────────────────────────────
  const chao = BABYLON.MeshBuilder.CreateGround('chao', {width:20, height:20}, scene);
  const matChao = new BABYLON.StandardMaterial('mchao', scene);
  matChao.diffuseColor  = new BABYLON.Color3(0.12, 0.10, 0.10);
  matChao.specularColor = new BABYLON.Color3(0.4, 0.4, 0.4);
  matChao.specularPower = 64;
  chao.material = matChao;

  // Grade
  const linhas = [];
  for (let i = -10; i <= 10; i++) {
    linhas.push([new BABYLON.Vector3(i,0.005,-10), new BABYLON.Vector3(i,0.005,10)]);
    linhas.push([new BABYLON.Vector3(-10,0.005,i), new BABYLON.Vector3(10,0.005,i)]);
  }
  const grade = BABYLON.MeshBuilder.CreateLineSystem('grade', {lines: linhas}, scene);
  grade.color = new BABYLON.Color3(0.25, 0.18, 0.18);
  grade.alpha = 0.6;

  // ── Plataforma ─────────────────────────────────────────
  const plat = BABYLON.MeshBuilder.CreateCylinder('plat',{diameter:3,height:0.15,tessellation:32},scene);
  plat.position.y = 0.075;
  const matPlat = new BABYLON.StandardMaterial('mplat',scene);
  matPlat.diffuseColor  = new BABYLON.Color3(0.18,0.08,0.08);
  matPlat.specularColor = new BABYLON.Color3(0.6,0.6,0.6);
  matPlat.specularPower = 128;
  plat.material = matPlat;

  const anel = BABYLON.MeshBuilder.CreateTorus('anel',{diameter:3.2,thickness:0.06,tessellation:48},scene);
  anel.position.y = 0.1;
  const matAnel = new BABYLON.StandardMaterial('manel',scene);
  matAnel.diffuseColor  = new BABYLON.Color3(0.9,0.05,0.05);
  matAnel.emissiveColor = new BABYLON.Color3(0.4,0.0,0.0);
  anel.material = matAnel;

  // ── Estrutura industrial ───────────────────────────────
  [[-7,0,-7],[-7,0,7],[7,0,-7],[7,0,7]].forEach(([x,y,z],i) => {
    const col = BABYLON.MeshBuilder.CreateBox('col'+i,{width:0.4,height:6,depth:0.4},scene);
    col.position = new BABYLON.Vector3(x,3,z);
    const mc = new BABYLON.StandardMaterial('mc'+i,scene);
    mc.diffuseColor = new BABYLON.Color3(0.15,0.12,0.12);
    col.material = mc;
  });
  [[0,6,7],[0,6,-7],[-7,6,0],[7,6,0]].forEach(([x,y,z],i) => {
    const vig = BABYLON.MeshBuilder.CreateBox('vig'+i,{width:0.2,height:0.2,depth:14},scene);
    vig.position = new BABYLON.Vector3(x,y,z);
    vig.rotation.y = i < 2 ? 0 : Math.PI/2;
    const mv = new BABYLON.StandardMaterial('mv'+i,scene);
    mv.diffuseColor = new BABYLON.Color3(0.2,0.15,0.15);
    vig.material = mv;
  });

  // Lâmpadas
  [[-4,5,-4],[-4,5,4],[4,5,-4],[4,5,4]].forEach(([x,y,z],i) => {
    const lamp = BABYLON.MeshBuilder.CreateSphere('lamp'+i,{diameter:0.3},scene);
    lamp.position = new BABYLON.Vector3(x,y,z);
    const ml = new BABYLON.StandardMaterial('ml'+i,scene);
    ml.emissiveColor = new BABYLON.Color3(1.0,0.7,0.3);
    lamp.material = ml;
    const pl = new BABYLON.PointLight('pl'+i,new BABYLON.Vector3(x,y-0.2,z),scene);
    pl.diffuse = new BABYLON.Color3(1.0,0.6,0.2);
    pl.intensity = 0.3; pl.range = 6;
  });

  // ── Painéis SENAI ──────────────────────────────────────
  [
    {pos:new BABYLON.Vector3(-5,2,-9.5), rot:0,           txt:'SENAI · MECATRÔNICA'},
    {pos:new BABYLON.Vector3( 5,2,-9.5), rot:0,           txt:'ESP32 · WEBSOCKET · XR'},
    {pos:new BABYLON.Vector3(-9.5,2,0),  rot:Math.PI/2,   txt:'ANTONIO ADOLPHE LOBBE'},
    {pos:new BABYLON.Vector3( 9.5,2,0),  rot:-Math.PI/2,  txt:'SÃO CARLOS · SP'},
  ].forEach(({pos,rot,txt},i) => {
    const pl = BABYLON.MeshBuilder.CreatePlane('pain'+i,{width:4,height:1},scene);
    pl.position = pos; pl.rotation.y = rot;
    const dtx = new BABYLON.DynamicTexture('ptx'+i,{width:512,height:128},scene);
    const ctx = dtx.getContext();
    ctx.fillStyle='rgba(20,2,4,0.9)'; ctx.fillRect(0,0,512,128);
    ctx.strokeStyle='#E3000F'; ctx.lineWidth=3; ctx.strokeRect(4,4,504,120);
    ctx.fillStyle='#E3000F'; ctx.font='bold 32px monospace';
    ctx.textAlign='center'; ctx.fillText(txt,256,74);
    dtx.update();
    const mp = new BABYLON.StandardMaterial('mptx'+i,scene);
    mp.diffuseTexture=dtx; mp.emissiveTexture=dtx; mp.backFaceCulling=false;
    pl.material=mp;
  });

  // ── Label flutuante ────────────────────────────────────
  const labelP = BABYLON.MeshBuilder.CreatePlane('lbl',{width:2.8,height:0.7},scene);
  labelP.position      = new BABYLON.Vector3(0,3.5,0);
  labelP.billboardMode = BABYLON.Mesh.BILLBOARDMODE_ALL;
  const dynTex = new BABYLON.DynamicTexture('dt',{width:320,height:80},scene);
  dynTex.hasAlpha = true;
  const matLbl = new BABYLON.StandardMaterial('mlbl',scene);
  matLbl.diffuseTexture=dynTex; matLbl.emissiveTexture=dynTex; matLbl.backFaceCulling=false;
  labelP.material = matLbl;

  function atualizarLabel(v) {
    const ctx = dynTex.getContext();
    ctx.clearRect(0,0,320,80);
    ctx.fillStyle='rgba(20,2,4,0.8)';
    ctx.beginPath(); ctx.roundRect(3,3,314,74,6); ctx.fill();
    ctx.strokeStyle='#E3000F'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.roundRect(3,3,314,74,6); ctx.stroke();
    ctx.fillStyle='#F5A623'; ctx.font='bold 18px monospace'; ctx.textAlign='left';
    ctx.fillText('POT: '+v.toFixed(3),16,32);
    ctx.fillStyle='#00C9A7';
    ctx.fillText('RPM: '+Math.round(v*3600),16,58);
    ctx.fillStyle='rgba(240,230,230,0.3)'; ctx.font='11px monospace';
    ctx.textAlign='right'; ctx.fillText('SENAI XR LAB',308,70);
    dynTex.update();
  }

  // ── Partículas ─────────────────────────────────────────
  const partSys = new BABYLON.ParticleSystem('spark',60,scene);
  partSys.emitter      = new BABYLON.Vector3(0,2.5,0);
  partSys.minEmitBox   = new BABYLON.Vector3(-0.1,0,-0.1);
  partSys.maxEmitBox   = new BABYLON.Vector3( 0.1,0, 0.1);
  partSys.color1       = new BABYLON.Color4(1.0,0.5,0.1,1);
  partSys.color2       = new BABYLON.Color4(1.0,0.1,0.1,0.5);
  partSys.colorDead    = new BABYLON.Color4(0.2,0.0,0.0,0);
  partSys.minSize=0.02; partSys.maxSize=0.08;
  partSys.minLifeTime=0.1; partSys.maxLifeTime=0.4;
  partSys.emitRate     = 0;
  partSys.gravity      = new BABYLON.Vector3(0,-4,0);
  partSys.direction1   = new BABYLON.Vector3(-1,2,-1);
  partSys.direction2   = new BABYLON.Vector3( 1,4, 1);
  partSys.minEmitPower=1; partSys.maxEmitPower=3;
  partSys.updateSpeed  = 0.02;
  partSys.start();

  // ── Engrenagem procedural (fallback) ───────────────────
  // Usada se o GLB não carregar
  const engGrupo = new BABYLON.TransformNode('engGrupo', scene);
  engGrupo.position.y = 0.15;

  const matEng = new BABYLON.StandardMaterial('meng',scene);
  matEng.diffuseColor  = new BABYLON.Color3(0.7,0.5,0.1);
  matEng.specularColor = new BABYLON.Color3(1.0,0.9,0.5);
  matEng.specularPower = 256;

  const engBase = BABYLON.MeshBuilder.CreateCylinder('eng',{diameter:1.4,height:0.5,tessellation:8},scene);
  engBase.parent = engGrupo; engBase.material = matEng;

  for (let i = 0; i < 8; i++) {
    const ang = (i/8)*Math.PI*2;
    const d = BABYLON.MeshBuilder.CreateBox('d'+i,{width:0.25,height:0.5,depth:0.35},scene);
    d.position  = new BABYLON.Vector3(Math.cos(ang)*0.85, 0, Math.sin(ang)*0.85);
    d.rotation.y = ang;
    d.parent    = engGrupo;
    d.material  = matEng;
  }

  const eixo = BABYLON.MeshBuilder.CreateCylinder('eixo',{diameter:0.2,height:2.5,tessellation:16},scene);
  eixo.parent = engGrupo;
  const matEixo = new BABYLON.StandardMaterial('meixo',scene);
  matEixo.diffuseColor=new BABYLON.Color3(0.5,0.5,0.55);
  matEixo.specularPower=512; eixo.material=matEixo;

  // ── Carrega GLB ────────────────────────────────────────
  setProgresso(95, 'Carregando modelo 3D...');

  try {
    const partes     = MODEL_URL.split('/');
    const nomeArq    = partes.pop();
    const pastaArq   = partes.join('/') + '/';

    const resultado = await BABYLON.SceneLoader.ImportMeshAsync(
      "", pastaArq, nomeArq, scene,
      (evt) => {
        if (evt.total > 0) {
          const pct = 95 + (evt.loaded / evt.total) * 4;
          setProgresso(pct, 'Carregando modelo 3D...');
        }
      }
    );

    meshesGLB  = resultado.meshes;
    usandoGLB  = true;

    // Esconde fallback procedural
    engGrupo.setEnabled(false);

    // Cria um nó pai para agrupar todos os meshes do GLB
    // Isso garante rotação correta em torno do centro da cena
    rootGLB = new BABYLON.TransformNode('glbRoot', scene);
    rootGLB.position = new BABYLON.Vector3(0, 0.15, 0);

    // Reparenta todos os meshes para o novo nó pai
    // pinion_0 é excluído da animação e da cena
    meshesGLB.forEach(m => {
      if (m.name === 'pinion_0') {
        m.isVisible = false;   // esconde da cena
        m.setEnabled(false);   // desativa completamente
      } else {
        m.parent = rootGLB;
      }
    });

    const raiz = rootGLB;

    // Calcula bounding box para escala automática
    meshesGLB.forEach(m => m.computeWorldMatrix(true));
    const bb     = rootGLB.getHierarchyBoundingVectors(true);
    const tam    = bb.max.subtract(bb.min);
    const maior  = Math.max(tam.x, tam.y, tam.z);
    const escala = maior > 0 ? (1.8 / maior) : 1;

    // Aplica escala no rootGLB — afeta todos os filhos
    rootGLB.scaling  = new BABYLON.Vector3(escala, escala, escala);

    // Ajusta emissão de partículas para o topo do modelo
    partSys.emitter = new BABYLON.Vector3(0, tam.y * escala + 0.5, 0);

    console.log('[GLB] Carregado — meshes:', meshesGLB.length, '| escala:', escala.toFixed(3));
    meshesGLB.forEach((m,i) => console.log('  mesh['+i+']:', m.name));

  } catch (err) {
    console.warn('[GLB] Falha ao carregar — usando procedural:', err.message);
    usandoGLB = false;
    engGrupo.setEnabled(true);
  }

  setProgresso(100, 'Pronto!');

  // ═══════════════════════════════════════════════════════
  //  LOOP DE ANIMAÇÃO
  // ═══════════════════════════════════════════════════════
  scene.registerBeforeRender(() => {
    // Velocidade proporcional ao potenciômetro
    // vel = 0 quando sensor=0, vel máxima quando sensor=1
    const vel = 0.005 + valorSensor * 0.15;

    if (usandoGLB && rootGLB) {
      // Gira o nó pai — todos os meshes do GLB seguem juntos
      rootGLB.rotation.y += vel;
    } else {
      // ── Fallback procedural ──
      engGrupo.rotation.y += vel;
    }

    // Efeitos visuais reativos
    anel.position.y  = 0.1 + Math.sin(Date.now() * 0.002) * 0.02;
    spot.intensity   = 0.4 + valorSensor * 2.2;
    partSys.emitRate = valorSensor > 0.6 ? Math.floor(valorSensor * 80) : 0;

    // Acumula rotação para telemetria
    rotAcum += vel;

    // Atualiza HUD e label
    atualizarHUD(valorSensor);
    atualizarLabel(valorSensor);
  });

  engine.runRenderLoop(() => scene.render());
  window.addEventListener('resize', () => engine.resize());

  // ═══════════════════════════════════════════════════════
  //  WEBSOCKET — ESP32
  // ═══════════════════════════════════════════════════════
  let msgCount = 0;

  // ── MQTT.js — broker público HiveMQ ─────────────────────────
  let msgCount  = 0;
  let mqttClient = null;

  function conectarMQTT() {
    document.getElementById('status-txt').textContent = 'Conectando ao broker MQTT...';
    document.getElementById('t-ws').textContent       = 'MQTT...';

    const clientId = 'senai-browser-' + Math.random().toString(16).substr(2, 8);

    mqttClient = mqtt.connect(MQTT_BROKER, {
      clientId:      clientId,
      keepalive:     30,
      reconnectPeriod: 3000,
      connectTimeout:  5000,
      clean:         true
    });

    mqttClient.on('connect', () => {
      console.log('[MQTT] Conectado ao broker HiveMQ');
      document.getElementById('dot').className          = 'on';
      document.getElementById('status-txt').textContent = 'MQTT conectado ✓  —  gire o potenciômetro';
      document.getElementById('t-ws').textContent       = 'MQTT OK';

      // Assina o tópico do ESP32
      mqttClient.subscribe(MQTT_TOPICO, { qos: 0 }, (err) => {
        if (err) {
          console.error('[MQTT] Erro ao assinar:', err);
        } else {
          console.log('[MQTT] Assinando:', MQTT_TOPICO);
        }
      });
    });

    mqttClient.on('message', (topico, payload) => {
      try {
        const d = JSON.parse(payload.toString());
        if (typeof d.valor === 'number') {
          valorSensor = Math.max(0, Math.min(1, d.valor));
          msgCount++;
          if (msgCount % 20 === 0) {
            document.getElementById('t-ws').textContent = msgCount + ' msgs';
          }
        }
      } catch(err) {
        console.warn('[MQTT] Payload inválido:', payload.toString());
      }
    });

    mqttClient.on('reconnect', () => {
      document.getElementById('dot').className          = '';
      document.getElementById('status-txt').textContent = 'MQTT reconectando...';
      document.getElementById('t-ws').textContent       = 'RECONECT...';
    });

    mqttClient.on('error', (err) => {
      console.error('[MQTT] Erro:', err.message);
      document.getElementById('status-txt').textContent = 'Erro MQTT: ' + err.message;
      document.getElementById('t-ws').textContent       = 'ERRO';
    });

    mqttClient.on('offline', () => {
      document.getElementById('dot').className          = '';
      document.getElementById('status-txt').textContent = 'MQTT offline — reconectando...';
    });
  }

  conectarMQTT();

  // ═══════════════════════════════════════════════════════
  //  WEBXR
  // ═══════════════════════════════════════════════════════
  const btnVR = document.getElementById('btn-vr');
  const btnAR = document.getElementById('btn-ar');

  const [suportaVR, suportaAR] = await Promise.all([
    BABYLON.WebXRSessionManager.IsSessionSupportedAsync('immersive-vr'),
    BABYLON.WebXRSessionManager.IsSessionSupportedAsync('immersive-ar')
  ]);

  if (!suportaVR) { btnVR.disabled=true; btnVR.textContent='[ VR NÃO SUPORTADO ]' }
  if (!suportaAR) { btnAR.disabled=true; btnAR.textContent='[ AR NÃO SUPORTADO ]' }

  const xrHelper = await scene.createDefaultXRExperienceAsync({
    floorMeshes: [chao], disableDefaultUI: true, optionalFeatures: true
  });

  btnVR.addEventListener('click', async () => {
    if (xrHelper.baseExperience.state === BABYLON.WebXRState.IN_XR) {
      await xrHelper.baseExperience.exitXRAsync();
      btnVR.textContent = '[ VR IMERSIVO ]';
    } else {
      await xrHelper.baseExperience.enterXRAsync('immersive-vr','local-floor');
      btnVR.textContent = '[ SAIR DO VR ]';
    }
  });

  btnAR.addEventListener('click', async () => {
    if (xrHelper.baseExperience.state === BABYLON.WebXRState.IN_XR) {
      await xrHelper.baseExperience.exitXRAsync();
      btnAR.textContent = '[ AR PASSTHROUGH ]';
      chao.isVisible=true; grade.isVisible=true;
    } else {
      await xrHelper.baseExperience.enterXRAsync('immersive-ar','local-floor');
      btnAR.textContent = '[ SAIR DO AR ]';
      chao.isVisible=false; grade.isVisible=false;
    }
  });
}

// ═══════════════════════════════════════════════════════════
//  CARREGAMENTO — Babylon.js + loader GLB
// ═══════════════════════════════════════════════════════════
function carregarScript(url) {
  return new Promise((ok, err) => {
    const s = document.createElement('script');
    s.src = url; s.onload = ok; s.onerror = err;
    document.head.appendChild(s);
  });
}

async function carregarBabylon() {
  const cdns = [
    'https://cdn.jsdelivr.net/npm/babylonjs@6.48.1/babylon.min.js',
    'https://unpkg.com/babylonjs@6.48.1/babylon.min.js'
  ];
  const loaders = [
    'https://cdn.jsdelivr.net/npm/babylonjs-loaders@6.48.1/babylonjs.loaders.min.js',
    'https://unpkg.com/babylonjs-loaders@6.48.1/babylonjs.loaders.min.js'
  ];
  // Draco decoder — necessário se o GLB foi comprimido com Draco (gltf.report)
  const dracos = [
    'https://cdn.jsdelivr.net/npm/babylonjs@6.48.1/draco_decoder.js',
  ];

  setProgresso(10, 'Baixando Babylon.js...');

  for (const url of cdns) {
    try {
      await carregarScript(url);
      setProgresso(60, 'Carregando plugin GLB...');
      break;
    } catch(e) {
      console.warn('[LOAD] CDN falhou, tentando próxima:', url);
    }
  }

  if (typeof BABYLON === 'undefined') {
    mostrarErro('Falha ao carregar Babylon.js. Verifique sua conexão.');
    return;
  }

  for (const url of loaders) {
    try {
      await carregarScript(url);
      setProgresso(80, 'Iniciando cena...');
      break;
    } catch(e) {
      console.warn('[LOAD] Loader CDN falhou, tentando próxima:', url);
    }
  }

  // Carrega Draco decoder (necessário para GLB comprimido)
  try {
    await carregarScript('https://cdn.jsdelivr.net/npm/babylonjs@6.48.1/draco_decoder.js');
    BABYLON.DracoCompression.Configuration = {
      decoder: {
        wasmUrl:     "https://cdn.jsdelivr.net/npm/babylonjs@6.48.1/draco_decoder.wasm",
        wasmBinaryUrl: "https://cdn.jsdelivr.net/npm/babylonjs@6.48.1/draco_decoder.wasm",
        fallbackUrl: "https://cdn.jsdelivr.net/npm/babylonjs@6.48.1/draco_decoder.js"
      }
    };
  } catch(e) {
    console.warn('[DRACO] Decoder não carregado — GLB sem compressão Draco deve funcionar normalmente');
  }

  setTimeout(() => iniciarCena(), 100);
}

carregarBabylon();
</script>
